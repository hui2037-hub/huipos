
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>咕嚕咕嚕 — 廚房出單</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f5f0;--s1:#fff;--s2:#f7faf7;--s3:#edf2ed;
  --acc:#2e7d52;--acc2:#3da068;--acc3:#c8e6d4;
  --red:#d94040;--amber:#e07c20;--amber2:#fff8e8;
  --txt:#1a2e22;--dim:#6b8878;--bdr:#d0e4d8;--r:10px;
  --new:#fff3cd;--new-bdr:#f5c842;
  --doing:#e8f5ff;--doing-bdr:#60b4f5;
  --done:#f0faf4;--done-bdr:#7ecfa0;
}
body{background:var(--bg);color:var(--txt);font-family:'PingFang TC','Microsoft JhengHei','Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
header{background:var(--acc);height:58px;display:flex;align-items:center;padding:0 20px;gap:14px;box-shadow:0 2px 8px #2e7d5230;flex-shrink:0}
.h-logo{display:flex;flex-direction:column;line-height:1.1;margin-right:auto}
.h-logo .m{font-size:1.15rem;font-weight:900;color:#fff;letter-spacing:.1em}
.h-logo .s{font-size:.58rem;color:#a8d8bc;letter-spacing:.18em}
.h-badge{font-size:.78rem;font-weight:700;color:#fff;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.3);border-radius:18px;padding:4px 12px}
.h-badge.live{background:rgba(255,220,80,.25);border-color:rgba(255,220,80,.5);color:#ffe066;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.h-btn{background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.3);border-radius:8px;padding:6px 14px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.12s}
.h-btn:hover{background:rgba(255,255,255,.28)}
.h-btn.danger{background:rgba(255,80,80,.2);border-color:rgba(255,120,120,.4)}
.clock{font-size:.78rem;color:#a8d8bc;white-space:nowrap}

/* STATS BAR */
.stats{display:flex;gap:0;background:var(--s1);border-bottom:1px solid var(--bdr);flex-shrink:0}
.stat{flex:1;text-align:center;padding:10px 0;border-right:1px solid var(--bdr);cursor:pointer;transition:.12s;user-select:none}
.stat:last-child{border-right:none}
.stat:hover{background:var(--s3)}
.stat.active{background:var(--s3);border-bottom:2.5px solid var(--acc)}
.stat-num{font-size:1.4rem;font-weight:900}
.stat-num.new{color:var(--amber)}
.stat-num.doing{color:#2080c0}
.stat-num.done{color:var(--acc)}
.stat-lbl{font-size:.68rem;color:var(--dim);margin-top:1px}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-thumb{background:var(--acc3);border-radius:4px}

.empty-state{text-align:center;padding:60px 20px;color:var(--dim)}
.empty-state .icon{font-size:3.5rem;display:block;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:.9rem}

/* ORDER CARD */
.ocard{border-radius:12px;border:2px solid var(--bdr);background:var(--s1);overflow:hidden;box-shadow:0 2px 8px #00000008;transition:.2s}
.ocard.status-new{border-color:var(--new-bdr);background:var(--new);animation:slideIn .3s ease}
.ocard.status-doing{border-color:var(--doing-bdr);background:var(--doing)}
.ocard.status-done{border-color:var(--done-bdr);background:var(--done);opacity:.75}
@keyframes slideIn{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}

.ocard-head{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid rgba(0,0,0,.06)}
.ocard-table{font-size:1rem;font-weight:900}
.ocard-type{font-size:.7rem;font-weight:700;padding:2px 9px;border-radius:10px}
.ocard-type.di{background:#e8f5ee;color:#2e7d52;border:1px solid #a8d8bc}
.ocard-type.to{background:#fff8e8;color:#7a4500;border:1px solid #f5c070}
.ocard-time{font-size:.7rem;color:var(--dim);margin-left:auto}
.ocard-oid{font-size:.65rem;color:#aaa}
.ocard-elapsed{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:8px;background:rgba(0,0,0,.06)}
.ocard-elapsed.urgent{background:#ffe0e0;color:var(--red)}

.ocard-items{padding:10px 14px}
.oitem{display:flex;align-items:baseline;gap:6px;padding:4px 0;border-bottom:1px dashed rgba(0,0,0,.07)}
.oitem:last-child{border:none}
.oitem-name{font-size:.9rem;font-weight:600;flex:1}
.oitem-vars{font-size:.72rem;color:var(--dim)}
.oitem-note{font-size:.7rem;color:var(--amber);font-weight:600}
.oitem-qty{font-size:.88rem;font-weight:800;color:var(--acc);background:var(--acc3);border-radius:6px;padding:1px 7px;white-space:nowrap}

.ocard-foot{display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid rgba(0,0,0,.06);background:rgba(0,0,0,.02)}
.ocard-total{font-size:.78rem;color:var(--dim)}
.ocard-total span{font-weight:800;color:var(--acc)}
.btn-action{padding:7px 16px;border-radius:8px;border:none;font-weight:800;font-size:.8rem;cursor:pointer;font-family:inherit;transition:.12s;margin-left:auto}
.btn-start{background:#60b4f5;color:#fff}
.btn-start:hover{background:#3a9de0}
.btn-done{background:var(--acc);color:#fff}
.btn-done:hover{background:var(--acc2)}
.btn-undo{background:var(--s3);color:var(--dim);border:1.5px solid var(--bdr)!important;font-size:.72rem;padding:5px 10px}
.btn-print-ticket{background:var(--s3);color:var(--txt);border:1.5px solid var(--bdr)!important;font-size:.72rem;padding:5px 10px}

/* NOTIFICATION TOAST */
.toast{position:fixed;top:70px;right:16px;background:var(--s1);border:2px solid var(--new-bdr);border-radius:12px;padding:12px 16px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:999;max-width:260px;transform:translateX(300px);transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(0)}
.toast-title{font-size:.85rem;font-weight:800;color:var(--amber);margin-bottom:3px}
.toast-body{font-size:.78rem;color:var(--txt)}

/* PRINT styles for single ticket */
@media print{
  body>*{display:none!important}
  #print-ticket{display:block!important}
}
#print-ticket{display:none}
</style>
</head>
<body>

<header>
  <div class="h-logo"><span class="m">咕嚕咕嚕</span><span class="s">廚 房 出 單</span></div>
  <span class="clock" id="clock"></span>
  <span class="h-badge live" id="live-badge">● 監聽中</span>
  <button class="h-btn" onclick="toggleFilter()">篩選狀態</button>
  <button class="h-btn danger" onclick="clearDone()">清除完成</button>
</header>

<div class="stats">
  <div class="stat active" id="tab-all" onclick="setTab('all')">
    <div class="stat-num" id="cnt-all">0</div><div class="stat-lbl">全部</div>
  </div>
  <div class="stat" id="tab-new" onclick="setTab('new')">
    <div class="stat-num new" id="cnt-new">0</div><div class="stat-lbl">🆕 待處理</div>
  </div>
  <div class="stat" id="tab-doing" onclick="setTab('doing')">
    <div class="stat-num doing" id="cnt-doing">0</div><div class="stat-lbl">🔥 製作中</div>
  </div>
  <div class="stat" id="tab-done" onclick="setTab('done')">
    <div class="stat-num done" id="cnt-done">0</div><div class="stat-lbl">✅ 完成</div>
  </div>
</div>

<div class="main" id="main"></div>

<div class="toast" id="toast">
  <div class="toast-title" id="toast-title"></div>
  <div class="toast-body" id="toast-body"></div>
</div>

<div id="print-ticket"></div>

<script>
let orders=[];
let activeTab='all';
let seenIds=new Set();

// ── LOAD ─────────────────────────────────────────────────────
function loadOrders(){
  try{ orders=JSON.parse(localStorage.getItem('gugu_orders')||'[]'); }
  catch(e){ orders=[]; }
}

// ── STORAGE EVENT (cross-tab or same-tab dispatch) ────────────
window.addEventListener('storage',e=>{
  if(e.key!=='gugu_orders')return;
  const prev=orders.map(o=>o.id);
  loadOrders();
  const newOnes=orders.filter(o=>!prev.includes(o.id));
  newOnes.forEach(o=>{
    if(!seenIds.has(o.id)){
      seenIds.add(o.id);
      showToast(o);
      playBeep();
    }
  });
  render();
});

// ── CLOCK ─────────────────────────────────────────────────────
function tick(){
  document.getElementById('clock').textContent=new Date().toLocaleTimeString('zh-TW');
  // update elapsed times
  document.querySelectorAll('.ocard-elapsed[data-ts]').forEach(el=>{
    const mins=Math.floor((Date.now()-parseInt(el.dataset.ts))/60000);
    el.textContent=mins+'分鐘前';
    el.classList.toggle('urgent',mins>=10);
  });
}
setInterval(tick,1000);tick();

// ── BEEP ──────────────────────────────────────────────────────
function playBeep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [440,550,660].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;g.gain.setValueAtTime(0.3,ctx.currentTime+i*.12);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*.12+.15);
      o.start(ctx.currentTime+i*.12);o.stop(ctx.currentTime+i*.12+.15);
    });
  }catch(e){}
}

// ── TOAST ─────────────────────────────────────────────────────
let toastTimer=null;
function showToast(o){
  document.getElementById('toast-title').textContent='🆕 新訂單！'+o.tableLabel;
  document.getElementById('toast-body').textContent=o.items.length+'道菜 ／ $'+o.total;
  const t=document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),4000);
}

// ── TABS ──────────────────────────────────────────────────────
function setTab(tab){
  activeTab=tab;
  document.querySelectorAll('.stat').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  render();
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  loadOrders();
  const sorted=[...orders].sort((a,b)=>{
    const rank={new:0,doing:1,done:2};
    return (rank[a.status]??0)-(rank[b.status]??0)||(b.ts-a.ts);
  }).reverse().sort((a,b)=>{ // new first, then doing, done last
    const r={new:0,doing:1,done:2};return (r[a.status]??0)-(r[b.status]??0);
  });

  const filtered=activeTab==='all'?sorted:sorted.filter(o=>o.status===activeTab);

  // counts
  const cnt=s=>orders.filter(o=>o.status===s).length;
  document.getElementById('cnt-all').textContent=orders.length;
  document.getElementById('cnt-new').textContent=cnt('new');
  document.getElementById('cnt-doing').textContent=cnt('doing');
  document.getElementById('cnt-done').textContent=cnt('done');

  const main=document.getElementById('main');
  if(!filtered.length){
    main.innerHTML=`<div class="empty-state"><span class="icon">🍜</span><p>${activeTab==='all'?'目前無訂單':'此分類無訂單'}</p></div>`;
    return;
  }
  main.innerHTML=filtered.map(o=>orderCard(o)).join('');
}

function orderCard(o){
  const mins=Math.floor((Date.now()-o.ts)/60000);
  const typeLabel=o.type==='dinein'?'內用':'外帶';
  const typeCls=o.type==='dinein'?'di':'to';
  const itemsHtml=o.items.map(it=>{
    const vs=it.vars?Object.values(it.vars).filter(Boolean).join('・'):'';
    return `<div class="oitem">
      <span class="oitem-name">${it.name}</span>
      ${vs?`<span class="oitem-vars">${vs}</span>`:''}
      ${it.note?`<span class="oitem-note">⚠️${it.note}</span>`:''}
      <span class="oitem-qty">×${it.qty}</span>
    </div>`;
  }).join('');

  let actionBtns='';
  if(o.status==='new'){
    actionBtns=`<button class="btn-action btn-start" onclick="setStatus('${o.id}','doing')">開始製作</button>`;
  } else if(o.status==='doing'){
    actionBtns=`
      <button class="btn-action btn-undo" onclick="setStatus('${o.id}','new')">退回</button>
      <button class="btn-action btn-done" onclick="setStatus('${o.id}','done')">✓ 完成出餐</button>`;
  } else {
    actionBtns=`<button class="btn-action btn-undo" onclick="setStatus('${o.id}','doing')">重新開始</button>`;
  }

  return `<div class="ocard status-${o.status}" id="card-${o.id}">
    <div class="ocard-head">
      <span class="ocard-table">${o.tableLabel}</span>
      <span class="ocard-type ${typeCls}">${typeLabel}</span>
      <span class="ocard-time">${o.time}</span>
      <span class="ocard-elapsed${mins>=10?' urgent':''}" data-ts="${o.ts}">${mins}分鐘前</span>
    </div>
    <div class="ocard-items">${itemsHtml}</div>
    <div class="ocard-foot">
      <span class="ocard-total">合計 <span>$${o.total}</span></span>
      <span style="font-size:.65rem;color:#bbb;margin-left:6px">${o.id}</span>
      <button class="btn-action btn-print-ticket" onclick="printOrder('${o.id}')">🖨️</button>
      ${actionBtns}
    </div>
  </div>`;
}

// ── STATUS ────────────────────────────────────────────────────
function setStatus(id,status){
  loadOrders();
  const o=orders.find(x=>x.id===id);
  if(o){o.status=status;localStorage.setItem('gugu_orders',JSON.stringify(orders));}
  render();
}

function clearDone(){
  if(!confirm('確定清除所有已完成訂單？'))return;
  loadOrders();
  orders=orders.filter(o=>o.status!=='done');
  localStorage.setItem('gugu_orders',JSON.stringify(orders));
  render();
}

// ── PRINT SINGLE ORDER ────────────────────────────────────────
function printOrder(id){
  loadOrders();
  const o=orders.find(x=>x.id===id);
  if(!o)return;
  const itemRows=o.items.map(it=>{
    const vs=it.vars?Object.values(it.vars).filter(Boolean).join('・'):'';
    const note=it.note?`<br><span style="font-size:10px;color:#c05000">⚠️ ${it.note}</span>`:'';
    return `<tr>
      <td style="padding:4px 5px;border-bottom:1px dashed #ccc;font-size:12px">${it.name}${vs?`<br><span style="font-size:10px;color:#555">${vs}</span>`:''}${note}</td>
      <td style="padding:4px 5px;border-bottom:1px dashed #ccc;text-align:center;font-size:12px">×${it.qty}</td>
      <td style="padding:4px 5px;border-bottom:1px dashed #ccc;text-align:right;font-size:12px">$${it.subtotal}</td>
    </tr>`;
  }).join('');
  const typeLabel=o.type==='dinein'?`內用・${o.tableLabel}`:'外帶';

  document.getElementById('print-ticket').innerHTML=`
    <div style="font-family:'PingFang TC','Microsoft JhengHei',sans-serif;width:280px;margin:0 auto;padding:14px;color:#111">
      <div style="text-align:center;border-bottom:2px solid #2e7d52;padding-bottom:8px;margin-bottom:8px">
        <div style="font-size:18px;font-weight:900;letter-spacing:.1em;color:#2e7d52">咕嚕咕嚕</div>
        <div style="font-size:9px;color:#999;letter-spacing:.18em">傳 統 小 吃</div>
      </div>
      <div style="font-size:11px;color:#555;margin-bottom:6px">
        <div style="display:flex;justify-content:space-between"><span>訂單</span><b>${o.id}</b></div>
        <div style="display:flex;justify-content:space-between;margin-top:2px"><span>時間</span><span>${o.time}</span></div>
        <div style="display:flex;justify-content:space-between;margin-top:2px"><span>類型</span><b style="color:#2e7d52">${typeLabel}</b></div>
      </div>
      <hr style="border:none;border-top:1px dashed #ccc;margin:6px 0">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="font-size:10px;color:#999">
          <th style="text-align:left;padding:2px 5px">品項</th>
          <th style="text-align:center;padding:2px 5px">數量</th>
          <th style="text-align:right;padding:2px 5px">小計</th>
        </tr></thead>
        <tbody>${itemRows}</tbody>
      </table>
      <div style="border-top:2px solid #2e7d52;margin-top:6px;padding-top:6px;display:flex;justify-content:space-between;font-size:14px;font-weight:900">
        <span>合計</span><span style="color:#2e7d52">$${o.total}</span>
      </div>
      <div style="text-align:center;font-size:9px;color:#bbb;margin-top:10px;border-top:1px dashed #ccc;padding-top:7px">謝謝惠顧・歡迎再來</div>
    </div>`;
  window.print();
}

function toggleFilter(){
  const tabs=['all','new','doing','done'];
  const i=tabs.indexOf(activeTab);
  setTab(tabs[(i+1)%tabs.length]);
}

// ── POLL fallback (same-tab, 1s) ──────────────────────────────
let lastCount=0;
setInterval(()=>{
  const raw=localStorage.getItem('gugu_orders')||'[]';
  const arr=JSON.parse(raw);
  if(arr.length!==lastCount){
    const newOnes=arr.filter(o=>!seenIds.has(o.id));
    newOnes.forEach(o=>{seenIds.add(o.id);showToast(o);playBeep();});
    lastCount=arr.length;
    orders=arr;
    render();
  }
},1000);

// ── INIT ──────────────────────────────────────────────────────
loadOrders();
orders.forEach(o=>seenIds.add(o.id));
lastCount=orders.length;
render();
</script>
</body>
</html>
