<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f5f0;--s1:#fff;--s2:#f7faf7;--s3:#edf2ed;
  --acc:#2e7d52;--acc2:#3da068;--acc3:#c8e6d4;
  --red:#d94040;--amber:#e07c20;
  --txt:#1a2e22;--dim:#6b8878;--bdr:#d0e4d8;--r:10px;
}
body{background:var(--bg);color:var(--txt);font-family:'PingFang TC','Microsoft JhengHei','Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
header{background:var(--acc);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 8px #2e7d5230;position:sticky;top:0;z-index:50}
.logo-wrap{display:flex;flex-direction:column;line-height:1.1}
.logo-main{font-size:1.2rem;font-weight:900;color:#fff;letter-spacing:.1em}
.logo-sub{font-size:.58rem;color:#a8d8bc;letter-spacing:.18em}
.tbl-pill{background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);border-radius:18px;padding:4px 14px;font-size:.8rem;font-weight:800;color:#fff}
.tbl-pill.to{background:rgba(255,200,100,.25);border-color:rgba(255,200,100,.5)}

/* CATEGORY BAR */
.cat-bar{display:flex;gap:6px;padding:10px 14px;background:var(--s1);border-bottom:1px solid var(--bdr);overflow-x:auto;flex-shrink:0;scrollbar-width:none;position:sticky;top:54px;z-index:40;box-shadow:0 1px 4px #2e7d521a}
.cat-bar::-webkit-scrollbar{display:none}
.cat-btn{white-space:nowrap;padding:5px 15px;border-radius:18px;border:1.5px solid var(--bdr);background:transparent;color:var(--dim);font-size:.85rem;cursor:pointer;font-family:inherit;transition:.12s}
.cat-btn.on{background:var(--acc);color:#fff;border-color:var(--acc);font-weight:700}

/* ITEMS */
.items-wrap{padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;align-content:start;flex:1}
.card{background:var(--s1);border:1.5px solid var(--bdr);border-radius:var(--r);padding:12px 11px;cursor:pointer;transition:.13s;position:relative;user-select:none;box-shadow:0 1px 4px #00000008}
.card:active{transform:scale(.97);background:#f0faf4}
.card.picked{border-color:var(--acc);background:#f0faf4}
.card-cat{font-size:.6rem;color:var(--dim);margin-bottom:2px}
.card-name{font-size:.92rem;font-weight:700;line-height:1.25;margin-bottom:5px}
.card-price{color:var(--acc);font-size:.95rem;font-weight:800}
.card-price::before{content:'$';font-size:.7em}
.qty-pip{position:absolute;top:-5px;right:-5px;background:var(--acc);color:#fff;font-weight:900;font-size:.68rem;width:19px;height:19px;border-radius:50%;display:none;align-items:center;justify-content:center}
.card.picked .qty-pip{display:flex}

/* CART BAR (sticky bottom) */
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:2px solid var(--bdr);padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:50;box-shadow:0 -2px 10px #2e7d521a}
.cart-info{flex:1;font-size:.82rem;color:var(--dim)}
.cart-count{font-size:1rem;font-weight:800;color:var(--txt)}
.cart-total{color:var(--acc);font-weight:800}
.cart-btn{background:var(--acc);color:#fff;border:none;padding:10px 20px;border-radius:var(--r);font-weight:800;font-size:.9rem;cursor:pointer;font-family:inherit;white-space:nowrap}
.cart-btn:disabled{background:var(--bdr);color:var(--dim);cursor:not-allowed}

/* VARIANT MODAL */
.vbg{display:none;position:fixed;inset:0;background:#1a2e2244;z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.vbg.on{display:flex}
.vmodal{background:var(--s1);border-radius:18px 18px 0 0;padding:22px 18px 32px;width:100%;max-width:480px;border-top:2px solid var(--bdr);max-height:80vh;overflow-y:auto}
.vmodal h3{color:var(--acc);font-size:1rem;margin-bottom:14px}
.vgroup{margin-bottom:14px}
.vgroup label{font-size:.75rem;color:var(--dim);display:block;margin-bottom:7px;font-weight:600}
.vopts{display:flex;flex-wrap:wrap;gap:7px}
.vopt{padding:7px 16px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--s3);color:var(--txt);cursor:pointer;font-size:.88rem;font-family:inherit;transition:.1s}
.vopt.on{border-color:var(--acc);background:var(--acc);color:#fff;font-weight:700}
.vnote{width:100%;padding:8px 10px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--s3);color:var(--txt);font-family:inherit;font-size:.88rem;resize:none;margin-top:8px}
.vnote:focus{outline:none;border-color:var(--acc)}
.vactions{display:flex;gap:8px;margin-top:16px}
.vcancel{flex:1;padding:11px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--s3);color:var(--dim);cursor:pointer;font-family:inherit}
.vadd{flex:2;padding:11px;border-radius:8px;border:none;background:var(--acc);color:#fff;font-weight:800;cursor:pointer;font-family:inherit;font-size:.95rem}

/* ORDER SHEET (slide up) */
.sheet-bg{display:none;position:fixed;inset:0;background:#1a2e2255;z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.sheet-bg.on{display:flex}
.sheet{background:var(--s1);border-radius:18px 18px 0 0;padding:20px 18px 36px;width:100%;max-width:480px;border-top:2px solid var(--bdr);max-height:85vh;overflow-y:auto}
.sheet h3{color:var(--acc);font-size:1rem;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.sheet-close{font-size:.75rem;color:var(--dim);background:none;border:none;cursor:pointer;font-family:inherit}
.srow{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.srow:last-of-type{border:none}
.sinfo{flex:1;min-width:0}
.sname{font-size:.88rem;font-weight:600}
.smeta{font-size:.72rem;color:var(--dim);margin-top:1px}
.sprice{font-size:.82rem;color:var(--acc);font-weight:700;white-space:nowrap}
.sqctrl{display:flex;align-items:center;gap:5px}
.sqbtn{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--bdr);background:var(--s3);color:var(--txt);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.sqbtn:hover{border-color:var(--acc);color:var(--acc)}
.sqnum{font-size:.88rem;font-weight:800;min-width:16px;text-align:center;color:var(--acc)}
.sheet-total{display:flex;justify-content:space-between;font-size:1rem;font-weight:800;color:var(--txt);padding:10px 0 14px;border-top:2px solid var(--bdr);margin-top:4px}
.sheet-total span:last-child{color:var(--acc)}
.sheet-submit{width:100%;padding:13px;border-radius:var(--r);border:none;background:var(--acc);color:#fff;font-size:1rem;font-weight:900;cursor:pointer;font-family:inherit}
.sheet-submit:hover{background:var(--acc2)}

/* SUCCESS */
.done-bg{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:24px}
.done-bg.on{display:flex}
.done-icon{font-size:5rem}
.done-title{color:var(--acc);font-size:1.8rem;font-weight:900}
.done-sub{color:var(--dim);font-size:.9rem;line-height:1.6}
.done-oid{font-size:.85rem;color:var(--acc);font-weight:700;background:#e8f5ee;border:1.5px solid var(--acc3);border-radius:20px;padding:5px 16px}
.done-more{background:var(--acc);color:#fff;border:none;padding:12px 32px;border-radius:var(--r);font-family:inherit;font-size:.95rem;font-weight:900;cursor:pointer;margin-top:6px}

.spacer{height:80px}
</style>
</head>

  <div class="done-oid" id="done-oid"></div>
  <button class="done-more" onclick="addMore()">繼續加點</button>
</div>

const CATS=['全部',...new Set(MENU.map(m=>m.cat))];
const params=new URLSearchParams(location.search);
const tableId=params.get('table')||'1';
const isDinein=tableId!=='takeout';
const tableLabel=isDinein?`${tableId} 號桌`:'外帶';

let activeCat='全部',cart=[],pendItem=null,pendVars={};

// header
const pill=document.getElementById('tbl-pill');
pill.textContent=isDinein?`🪑 ${tableLabel}`:`🥡 ${tableLabel}`;
if(!isDinein)pill.classList.add('to');

// cats
function renderCats(){
  document.getElementById('cat-bar').innerHTML=CATS.map(c=>
    `<button class="cat-btn${c===activeCat?' on':''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}
function setCat(c){activeCat=c;renderCats();renderItems()}

// items
function renderItems(){
  const items=activeCat==='全部'?MENU:MENU.filter(m=>m.cat===activeCat);
  document.getElementById('items-wrap').innerHTML=items.map(m=>{
    const qty=cart.filter(c=>c.item.id===m.id).reduce((s,c)=>s+c.qty,0);
    return `<div class="card${qty?' picked':''}" onclick="tap('${m.id}')">
      <div class="qty-pip">${qty}</div>
      <div class="card-cat">${m.cat}</div>
      <div class="card-name">${m.name}</div>
      <div class="card-price">${m.price}</div>
    </div>`;
  }).join('');
}

function tap(id){
  const m=MENU.find(x=>x.id===id);if(!m)return;
  if(!m.v.length){addCart(m,{},'');return}
  pendItem=m;pendVars={};
  m.v.forEach(g=>pendVars[g.t]=g.o[0]);
  document.getElementById('vname').textContent=m.name+` — $${m.price}`;
  document.getElementById('vnote').value='';
  document.getElementById('vgroups').innerHTML=m.v.map(g=>`
    <div class="vgroup"><label>${g.t}</label><div class="vopts">
    ${g.o.map(o=>`<button class="vopt${pendVars[g.t]===o?' on':''}" onclick="pv('${g.t}','${o}',this)">${o}</button>`).join('')}
    </div></div>`).join('');
  document.getElementById('vbg').classList.add('on');
}
function pv(t,o,el){pendVars[t]=o;el.closest('.vopts').querySelectorAll('.vopt').forEach(b=>b.classList.remove('on'));el.classList.add('on')}
function confirmV(){addCart(pendItem,{...pendVars},document.getElementById('vnote').value.trim());closeV()}
function closeV(){document.getElementById('vbg').classList.remove('on');pendItem=null}

function addCart(item,vars,note){
  const k=JSON.stringify(vars)+note;
  const ex=cart.find(c=>c.item.id===item.id&&JSON.stringify(c.vars)+c.note===k);
  if(ex)ex.qty++;else cart.push({item,qty:1,vars,note});
  renderBar();renderItems();
}
function chgQty(i,d){cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);renderSheet();renderBar();renderItems()}

function renderBar(){
  const qty=cart.reduce((s,c)=>s+c.qty,0);
  const total=cart.reduce((s,c)=>s+c.item.price*c.qty,0);
  document.getElementById('cart-count').textContent=qty+' 項';
  document.getElementById('cart-total').textContent=qty?` ／ $${total}`:'';
  document.getElementById('cart-btn').disabled=!qty;
}

function openSheet(){renderSheet();document.getElementById('sheetbg').classList.add('on')}
function closeSheet(){document.getElementById('sheetbg').classList.remove('on')}

function renderSheet(){
  const rows=document.getElementById('sheet-rows');
  const total=cart.reduce((s,c)=>s+c.item.price*c.qty,0);
  rows.innerHTML=cart.map((c,i)=>{
    const vs=Object.values(c.vars).join('·');
    const meta=[vs,c.note].filter(Boolean).join(' ｜ ');
    return `<div class="srow">
      <div class="sinfo"><div class="sname">${c.item.name}</div>${meta?`<div class="smeta">${meta}</div>`:''}</div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
        <div class="sprice">$${c.item.price*c.qty}</div>
        <div class="sqctrl">
          <button class="sqbtn" onclick="chgQty(${i},-1)">−</button>
          <span class="sqnum">${c.qty}</span>
          <button class="sqbtn" onclick="chgQty(${i},1)">＋</button>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('sheet-total-val').textContent='$'+total;
}

let fbReady = false;
window.addEventListener('firebase-ready', ()=>{ fbReady = true; });

function submitOrder(){
  const oid='ORD-'+Date.now().toString(36).toUpperCase();
  const total=cart.reduce((s,c)=>s+c.item.price*c.qty,0);
  const order={
    id:oid,
    table:tableId,
    tableLabel,
    type:isDinein?'dinein':'takeout',
    time:new Date().toLocaleString('zh-TW'),
    ts:Date.now(),
    items:cart.map(c=>({name:c.item.name,vars:c.vars,note:c.note,qty:c.qty,price:c.item.price,subtotal:c.item.price*c.qty})),
    total,
    status:'new'
  };

  // Disable button to prevent double-submit
  const submitBtn = document.querySelector('.sheet-submit');
  if(submitBtn){ submitBtn.disabled = true; submitBtn.textContent = '送出中…'; }

  function doSubmit(){
    try{
      const db = window.__firebaseDb;
      const ref = window.__firebaseRef;
      const push = window.__firebasePush;
      const set = window.__firebaseSet;
      const newRef = push(ref(db, 'orders'));
      set(newRef, order).then(()=>{
        finishSubmit(oid);
      }).catch(err=>{
        alert('送單失敗，請檢查網路連線後再試一次\n'+err.message);
        if(submitBtn){ submitBtn.disabled=false; submitBtn.textContent='✓ 送出點單給廚房'; }
      });
    }catch(e){
      alert('連線初始化中，請稍候 1 秒再試一次');
      if(submitBtn){ submitBtn.disabled=false; submitBtn.textContent='✓ 送出點單給廚房'; }
    }
  }

  if(fbReady){ doSubmit(); }
  else{
    // wait briefly for firebase to finish loading
    let tries=0;
    const iv=setInterval(()=>{
      tries++;
      if(fbReady){ clearInterval(iv); doSubmit(); }
      else if(tries>20){ clearInterval(iv); doSubmit(); /* attempt anyway */ }
    },150);
  }
}

function finishSubmit(oid){
  closeSheet();
  document.getElementById('done-oid').textContent='訂單編號：'+oid;
  document.getElementById('donebg').classList.add('on');
  const submitBtn = document.querySelector('.sheet-submit');
  if(submitBtn){ submitBtn.disabled=false; submitBtn.textContent='✓ 送出點單給廚房'; }
}

function addMore(){
  cart=[];
  document.getElementById('donebg').classList.remove('on');
  renderBar();renderItems();
}

// 確保 DOM 完全載入後才執行
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',()=>{renderCats();renderItems();renderBar();});
}else{
  renderCats();renderItems();renderBar();
}
</script>
</body>
</html>
